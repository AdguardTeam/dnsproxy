'name': Docker

'env':
  'GO_VERSION': '1.26.2'

'on':
  'push':
    'tags':
      - 'v*'
    # Builds from the default branch will be pushed with the `dev` tag.
    'branches':
      - 'master'
      - 'main'

'jobs':
  'docker':
    'runs-on': 'ubuntu-latest'
    'permissions':
      'contents': 'read'
      'packages': 'write'
    # Optional: set repository variable DOCKER_IMAGE_NAME (e.g. ghcr.io/user/dnsproxy).
    'env':
      'DOCKER_IMAGE_NAME': '${{ vars.DOCKER_IMAGE_NAME }}'
    'steps':
      - 'name': 'Checkout'
        'uses': 'actions/checkout@v3'
        'with':
          'fetch-depth': 0
      - 'name': 'Set up Go'
        'uses': 'actions/setup-go@v3'
        'with':
          'go-version': '${{ env.GO_VERSION }}'
      - 'name': 'Set up Go modules cache'
        'uses': 'actions/cache@v4'
        'with':
          'path': '~/go/pkg/mod'
          'key': "${{ runner.os }}-go-${{ hashFiles('go.sum') }}"
          'restore-keys': '${{ runner.os }}-go-'
      - 'name': 'Set up QEMU'
        'uses': 'docker/setup-qemu-action@v3'
      - 'name': 'Set up Docker Buildx'
        'uses': 'docker/setup-buildx-action@v3'
        'with':
          'install': true
      - 'name': 'Publish to GitHub Container Registry'
        'run': |-
          set -e -u -x

          RELEASE_VERSION="${GITHUB_REF##*/}"
          if [[ "${RELEASE_VERSION}" != v* ]]; then RELEASE_VERSION='dev'; fi
          echo "RELEASE_VERSION=\"${RELEASE_VERSION}\"" >> $GITHUB_ENV

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          # Default image to lowercase owner/repo (fork-friendly).  Override with
          # repository variable DOCKER_IMAGE_NAME if set.
          if [ -z "${DOCKER_IMAGE_NAME}" ]; then
            DOCKER_IMAGE_NAME="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          fi

          make \
            VERSION="${RELEASE_VERSION}" \
            DOCKER_IMAGE_NAME="${DOCKER_IMAGE_NAME}" \
            DOCKER_PUSH="1" \
            VERBOSE="1" \
            docker

  'notify':
    'needs':
      - 'docker'
    'if':
      ${{ always() &&
      (
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
      )
      }}
    'runs-on': ubuntu-latest
    'env':
      'SLACK_WEBHOOK_URL': ${{ secrets.SLACK_WEBHOOK_URL }}
    'steps':
      - 'name': Conclusion
        'uses': technote-space/workflow-conclusion-action@v1
      - 'name': Send Slack notif
        'if': ${{ env.SLACK_WEBHOOK_URL != '' }}
        'uses': 8398a7/action-slack@v3
        'with':
          'status': ${{ env.WORKFLOW_CONCLUSION }}
          'fields': workflow, repo, message, commit, author, eventName,ref
        'env':
          'GITHUB_TOKEN': ${{ secrets.GITHUB_TOKEN }}
          'SLACK_WEBHOOK_URL': ${{ secrets.SLACK_WEBHOOK_URL }}
